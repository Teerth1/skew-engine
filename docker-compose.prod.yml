version: '3.9'

services:
  # PostgreSQL — persistent store for SkewRecords and TradeLogs
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skew-postgres
    restart: always
    environment:
      POSTGRES_DB: skewdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - skew_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skewdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper — required by Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: skew-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || echo ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: skew-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Skew Engine Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skew-engine-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skewdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  skew_postgres_data:
