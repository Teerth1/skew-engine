spring:
  application:
    name: skew-engine
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/skewdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: skew-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  threads:
    virtual:
      enabled: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-1.5-flash
            temperature: 0.3
        embedding:
          options:
            model: text-embedding-004
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

  flyway:
    enabled: true
    locations: classpath:db/migration

schwab:
  client-id: ${SCHWAB_CLIENT_ID:}
  client-secret: ${SCHWAB_CLIENT_SECRET:}
  redirect-uri: ${SCHWAB_REDIRECT_URI:https://127.0.0.1}

alpaca:
  api-key: ${ALPACA_API_KEY:}
  secret-key: ${ALPACA_SECRET_KEY:}
  base-url: ${ALPACA_BASE_URL:https://paper-api.alpaca.markets}

# gemini:
#   api-key: ${GEMINI_API_KEY:}

alphavantage:
  api-key: ${ALPHAVANTAGE_API_KEY:}

discord:
  bot:
    token: ${DISCORD_BOT_TOKEN:}
    channel: ${DISCORD_BOT_CHANNEL:}
    guild: ${DISCORD_BOT_GUILD:}


trading:
  lookback-ticks: 10
  holding-ticks: 10
  spot-threshold: 0.0005
  skew-threshold: 0.0005
  # Phase 3 risk controls
  kill-switch: false
  max-positions: 1
  max-daily-loss: 500.0
  max-trades-per-day: 3
  min-agent-confidence: 0.5
  signal-consumer:
    concurrency: 3
  # Phase 5 External TradingAgents Client
  agents:
    enabled: false
    service-url: ${TRADING_AGENTS_URL:http://localhost:8000/analyze}

resilience4j:
  circuitbreaker:
    instances:
      alpacaService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      newsService:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
      tradingAgentsClientService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      alpacaService:
        maxAttempts: 3
        waitDuration: 1s
      newsService:
        maxAttempts: 2
        waitDuration: 2s
      tradingAgentsClientService:
        maxAttempts: 1
        waitDuration: 500ms

